<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacked! Open Redirect PoC</title>
    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            margin-top: 10%;
            padding: 20px;
        }
        h1 {
            font-size: 36px;
            text-transform: uppercase;
            animation: glitch 1s infinite alternate;
        }
        @keyframes glitch {
            0% { text-shadow: 2px 2px #ff0000, -2px -2px #00ff00; }
            100% { text-shadow: -2px -2px #ff0000, 2px 2px #00ff00; }
        }
        p {
            font-size: 18px;
        }
        .alert {
            color: red;
            font-weight: bold;
            font-size: 22px;
            margin-top: 20px;
        }
        .matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
            z-index: -1;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .manual-link {
            color: red;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 20px;
            border: 2px solid red;
            border-radius: 5px;
            display: inline-block;
            transition: 0.3s;
            margin-top: 20px;
        }
        .manual-link:hover {
            background-color: red;
            color: white;
        }
    </style>
    <script>
        function matrixEffect() {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            document.body.appendChild(canvas);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let letters = "0101011100101100110100101011001";
            letters = letters.split("");
            let fontSize = 14;
            let columns = canvas.width / fontSize;
            let drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.floor(Math.random() * canvas.height);
            }

            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#0f0";
                ctx.font = fontSize + "px monospace";

                for (let i = 0; i < drops.length; i++) {
                    let text = letters[Math.floor(Math.random() * letters.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.95) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }
            setInterval(draw, 33);
        }

        function showPopup() {
            alert("🚨 WARNING: You have been redirected due to an Open Redirect Vulnerability! 🚨");
        }

        function redirect() {
            showPopup();
            matrixEffect();
        }
    </script>
</head>
<body onload="redirect()">
    <div class="matrix"></div>
    <div class="container">
        <h1>⚠️ SYSTEM COMPROMISED ⚠️</h1>
        <p>Congratulations! You have successfully exploited an open redirect vulnerability.</p>
        <p class="alert">This is a security risk that could be used for phishing or malicious attacks!</p>
        <p>If this was unintentional, report it immediately.</p>
        <a href="https://your-report-page.com" class="manual-link">Report This Vulnerability</a>
    </div>
</body>
</html>
